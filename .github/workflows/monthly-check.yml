name: Monthly DE Rules Check

on:
  schedule:
    - cron: '0 15 19 * *'   # 매월 20일 KST 자정
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install requests beautifulsoup4

      - name: Run Check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_de.py

      - name: Commit hash file if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f de_hash.json ]; then
            git add de_hash.json
            git diff --staged --quiet || (git commit -m "🤖 [Monthly] fingerprint update" && git push)
          else
            echo "해시 파일 없음 - 커밋 생략"
          fi
